name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      HUGO_CACHEDIR: /tmp/hugo_cache
    steps:
      - name: Checkout TetraLogSource
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history for .GitInfo and .Lastmod
          submodules: recursive
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      
      - name: Install Python dependencies
        run: pip install -r requirements.txt
          
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache-dependency-path: '**/package-lock.json'
          cache: 'npm'
          check-latest: true
          node-version: 'lts/*'
      
      - name: Allow unicode file names
        run: git config core.quotePath false

      - name: Set up Node.js dependencies
        run: npm ci
      
      - name: Set up Dart Sass
        run: sudo snap install dart-sass
      
      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true
        
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '>=1.23.1'

      - name: Build site
        run: npm run build
      
      - name: Deploy to TetraLog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git clone https://github.com/TetraTheta/TetraLog.git
          cd TetraLog
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          rm -rf *
          cp -r ../public/* .
          git add .
          git commit -m "Deploy site updates"
          git push --force origin main
